services:
  db:
    image: postgres:16-alpine
    container_name: careeragent-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careeragent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careeragent}
      POSTGRES_DB: ${POSTGRES_DB:-careeragent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careeragent} -d ${POSTGRES_DB:-careeragent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: careeragent-backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careeragent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careeragent}
      POSTGRES_DB: ${POSTGRES_DB:-careeragent}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://careeragent:careeragent@db:5432/careeragent}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      ENABLE_SAMPLE_JOBS: ${ENABLE_SAMPLE_JOBS:-false}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      PLAYWRIGHT_USE_XVFB: ${PLAYWRIGHT_USE_XVFB:-false}
      PLAYWRIGHT_SLOW_MO_MS: ${PLAYWRIGHT_SLOW_MO_MS:-0}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: careeragent-frontend
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
      API_SERVER_URL: http://backend:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  postgres_data:
  frontend_node_modules:
